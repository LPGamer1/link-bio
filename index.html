<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-color: #050505 !important;
            background-image: radial-gradient(circle at top center, rgba(59, 130, 246, 0.15) 0%, #050505 80%) !important;
            background-attachment: fixed !important;
            color: #f8fafc !important;
            font-family: 'Inter', system-ui, sans-serif !important;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        body::after {
            content: "";
            position: fixed !important;
            inset: 0 !important;
            pointer-events: none !important;
            z-index: 0 !important;
            background-image:
                radial-gradient(1px 1px at 20px 20px, #ffffff, transparent),
                radial-gradient(1.5px 1.5px at 60px 80px, rgba(255, 255, 255, 0.7), transparent),
                radial-gradient(1px 1px at 100px 30px, rgba(255, 255, 255, 0.5), transparent),
                radial-gradient(2px 2px at 150px 130px, rgba(255, 255, 255, 0.4), transparent),
                radial-gradient(1px 1px at 190px 190px, rgba(255, 255, 255, 0.8), transparent) !important;
            background-size: 250px 250px !important;
            opacity: 0.35 !important;
        }

        .main-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.02) !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            border-radius: 12px !important;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: calc(100% - 40px);
            box-sizing: border-box;
            transition: 0.3s !important;
            backdrop-filter: blur(10px);
        }

        .main-card:hover {
            border-color: #3b82f6 !important;
            background: rgba(59, 130, 246, 0.05) !important;
            transform: translateY(-4px) !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-weight: 800;
            font-size: 24px;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        p {
            color: #8C8C8C;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .domain-badge {
            display: inline-block;
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            padding: 6px 14px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 30px;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .btn-link {
            display: block;
            background: #fff;
            color: #000;
            text-decoration: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            transition: 0.2s;
        }

        .btn-link:hover {
            background: #3b82f6;
            color: #fff;
            transform: scale(1.02);
        }

        @media (max-width: 480px) {
            .main-card {
                padding: 30px 20px;
                width: calc(100% - 30px);
            }
            h1 {
                font-size: 22px;
            }
            p {
                font-size: 14px;
                margin-bottom: 20px;
            }
            .domain-badge {
                margin-bottom: 25px;
            }
            .btn-link {
                padding: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>LP77</h1>
        <p>Estamos de casa nova para melhor te atender. Agora estamos em:</p>
        
        <div class="domain-badge">bio.lp77.one</div>
        
        <a href="https://bio.lp77.one" class="btn-link" id="redirect-link">ACESSAR NOVO SITE</a>
    </div>

    <script>
        const domain = "bio.lp77.one";
        const pathInfo = window.location.pathname + window.location.search + window.location.hash;
        document.getElementById("redirect-link").href = "https://" + domain + pathInfo;
    </script>

</body>
</html>
